<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Current focus</title>
  <desc id="desc">Three cards describing Aayush's focus on dependable AI pipelines, intelligent simulations, and human-centered machine learning.</desc>
  <defs><linearGradient id="rail"><stop stop-color="#9400d3"/><stop offset=".5" stop-color="#ed80e9"/><stop offset="1" stop-color="#d3d3ff"/></linearGradient></defs>
  <style>
    .bg{fill:#120717}.card{fill:#d8bfd812;stroke:#d8bfd866}.border{stroke:#d8bfd866}.primary{fill:#f9f7ff}.muted{fill:#d3d3ff}
    @media(prefers-color-scheme:light){.bg{fill:#faf8ff}.card{fill:#fff;stroke:#d8bfd8}.border{stroke:#d8bfd8}.primary{fill:#211326}.muted{fill:#5c3f62}}
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  </style>
  <rect class="bg" width="1200" height="300" rx="24" fill="#120717"/><rect class="border" x="1" y="1" width="1198" height="298" rx="23" fill="none" stroke="#d8bfd866"/>
  <text class="primary" x="48" y="56" fill="#f9f7ff" font-size="25" font-weight="700">Current focus</text><rect x="48" y="72" width="1104" height="3" rx="1.5" fill="url(#rail)" opacity=".9"/>
  <g transform="translate(48 102)">
    <g><rect class="card" width="346" height="150" rx="18" fill="#d8bfd812" stroke="#d8bfd866"/><circle cx="28" cy="30" r="8" fill="#9400d3"/><text class="primary" x="48" y="36" fill="#f9f7ff" font-size="17" font-weight="650">Dependable AI pipelines</text><text class="muted" x="24" y="74" fill="#d3d3ff" font-size="14"><tspan x="24">Reproducible inference, measurable latency,</tspan><tspan x="24" dy="23">and deployment paths that work without</tspan><tspan x="24" dy="23">specialized infrastructure.</tspan></text></g>
    <g transform="translate(379)"><rect class="card" width="346" height="150" rx="18" fill="#d8bfd812" stroke="#d8bfd866"/><circle cx="28" cy="30" r="8" fill="#ed80e9"/><text class="primary" x="48" y="36" fill="#f9f7ff" font-size="17" font-weight="650">Intelligent simulations</text><text class="muted" x="24" y="74" fill="#d3d3ff" font-size="14"><tspan x="24">Multi-agent learning, reward engineering,</tspan><tspan x="24" dy="23">real-time visualization, and systems that</tspan><tspan x="24" dy="23">make model behavior observable.</tspan></text></g>
    <g transform="translate(758)"><rect class="card" width="346" height="150" rx="18" fill="#d8bfd812" stroke="#d8bfd866"/><circle cx="28" cy="30" r="8" fill="#d3d3ff"/><text class="primary" x="48" y="36" fill="#f9f7ff" font-size="17" font-weight="650">Human-centered ML</text><text class="muted" x="24" y="74" fill="#d3d3ff" font-size="14"><tspan x="24">Neural interfaces, assistive computer</tspan><tspan x="24" dy="23">vision, and product experiences that turn</tspan><tspan x="24" dy="23">complex models into usable tools.</tspan></text></g>
  </g>
</svg>
