<svg xmlns="http://www.w3.org/2000/svg" width="520" height="195" viewBox="0 0 520 195" role="img" aria-labelledby="title desc">
  <title id="title">Initial GitHub analytics card</title><desc id="desc">A starter card showing verified public profile facts. GitHub Actions replaces it with current analytics after deployment.</desc>
  <rect width="520" height="195" rx="16" fill="#faf8ff" stroke="#d8bfd8"/><text x="28" y="38" fill="#9400d3" font-family="Segoe UI,sans-serif" font-size="19" font-weight="700">GitHub analytics</text><text x="492" y="36" text-anchor="end" fill="#5c3f62" font-family="Segoe UI,sans-serif" font-size="11">INITIAL SNAPSHOT</text>
  <g font-family="Segoe UI,sans-serif"><g transform="translate(28 70)"><text fill="#5c3f62" font-size="11">PUBLIC REPOSITORIES</text><text y="38" fill="#211326" font-size="28" font-weight="700">4</text></g><g transform="translate(192 70)"><text fill="#5c3f62" font-size="11">FEATURED BUILDS</text><text y="38" fill="#211326" font-size="28" font-weight="700">4</text></g><g transform="translate(348 70)"><text fill="#5c3f62" font-size="11">OPEN PAPER</text><text y="38" fill="#211326" font-size="28" font-weight="700">1</text></g><text x="28" y="166" fill="#5c3f62" font-size="12">Daily workflow will replace this card with live GitHub data.</text></g>
</svg>
