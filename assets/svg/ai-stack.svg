<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="250" viewBox="0 0 1200 250" role="img" aria-labelledby="title desc">
  <title id="title">AI engineering stack</title>
  <desc id="desc">A four-stage AI stack from data and perception through learning systems and serving to product interfaces.</desc>
  <style>
    .bg{fill:#120717}.card{fill:#d8bfd812;stroke:#d8bfd866}.border{stroke:#d8bfd866}.primary{fill:#f9f7ff}.muted{fill:#d3d3ff}.arrow{stroke:#d8bfd8}.accent{fill:#ed80e9}
    @media(prefers-color-scheme:light){.bg{fill:#faf8ff}.card{fill:#fff;stroke:#d8bfd8}.border{stroke:#d8bfd8}.primary{fill:#211326}.muted{fill:#5c3f62}.arrow{stroke:#5c3f62}.accent{fill:#9400d3}}
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  </style>
  <rect class="bg" width="1200" height="250" rx="24" fill="#120717"/><rect class="border" x="1" y="1" width="1198" height="248" rx="23" fill="none" stroke="#d8bfd866"/>
  <text class="primary" x="48" y="52" fill="#f9f7ff" font-size="24" font-weight="700">AI engineering stack</text><text class="muted" x="1152" y="52" text-anchor="end" fill="#d3d3ff" font-size="13">from signal to shipped system</text>
  <g transform="translate(48 82)">
    <g><rect class="card" width="244" height="120" rx="18" fill="#d8bfd812" stroke="#d8bfd866"/><text class="accent" x="22" y="34" fill="#ed80e9" font-size="12" font-weight="700" letter-spacing="1">01 · PERCEPTION</text><text class="primary" x="22" y="67" fill="#f9f7ff" font-size="16" font-weight="650">Signals &amp; data</text><text class="muted" x="22" y="92" fill="#d3d3ff" font-size="13">EEG · vision · features</text></g>
    <path class="arrow" d="M256 60h36" stroke="#d8bfd8" stroke-width="2"/><path class="arrow" d="m285 53 8 7-8 7" fill="none" stroke="#d8bfd8" stroke-width="2"/>
    <g transform="translate(304)"><rect class="card" width="244" height="120" rx="18" fill="#d8bfd812" stroke="#d8bfd866"/><text class="accent" x="22" y="34" fill="#ed80e9" font-size="12" font-weight="700" letter-spacing="1">02 · LEARNING</text><text class="primary" x="22" y="67" fill="#f9f7ff" font-size="16" font-weight="650">Models &amp; evaluation</text><text class="muted" x="22" y="92" fill="#d3d3ff" font-size="13">PyTorch · GRU/CTC · PPO</text></g>
    <path class="arrow" d="M560 60h36" stroke="#d8bfd8" stroke-width="2"/><path class="arrow" d="m589 53 8 7-8 7" fill="none" stroke="#d8bfd8" stroke-width="2"/>
    <g transform="translate(608)"><rect class="card" width="244" height="120" rx="18" fill="#d8bfd812" stroke="#d8bfd866"/><text class="accent" x="22" y="34" fill="#ed80e9" font-size="12" font-weight="700" letter-spacing="1">03 · SERVING</text><text class="primary" x="22" y="67" fill="#f9f7ff" font-size="16" font-weight="650">APIs &amp; infrastructure</text><text class="muted" x="22" y="92" fill="#d3d3ff" font-size="13">Flask · Docker · Supabase</text></g>
    <path class="arrow" d="M864 60h36" stroke="#d8bfd8" stroke-width="2"/><path class="arrow" d="m893 53 8 7-8 7" fill="none" stroke="#d8bfd8" stroke-width="2"/>
    <g transform="translate(912)"><rect class="card" width="240" height="120" rx="18" fill="#d8bfd812" stroke="#d8bfd866"/><text class="accent" x="22" y="34" fill="#ed80e9" font-size="12" font-weight="700" letter-spacing="1">04 · PRODUCT</text><text class="primary" x="22" y="67" fill="#f9f7ff" font-size="16" font-weight="650">Interfaces &amp; insight</text><text class="muted" x="22" y="92" fill="#d3d3ff" font-size="13">React · Next.js · real-time UI</text></g>
  </g>
</svg>
